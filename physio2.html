<!DOCTYPE html>
<html>
<head>
  <title>Internet Tester Page</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; margin-top: 40px; }
    h1 { color: #2c3e50; }
    button { padding: 10px 20px; font-size: 16px; margin: 10px; }
    #results { margin-top: 20px; font-size: 18px; white-space: pre-line; }
  </style>
</head>
<body>
  <h1>Internet Tester Page</h1>
  <p>Click below to test your connection.</p>
  <button onclick="pingTest()">Ping Test</button>
  <button onclick="downloadTest()">Download Speed Test</button>
  <button onclick="uploadTest()">Upload Speed Test</button>
  <div id="results"></div>

  <script>
    async function pingTest() {
      const start = performance.now();
      try {
        await fetch("https://www.google.com", {mode: 'no-cors'});
        const end = performance.now();
        const latency = (end - start).toFixed(2);
        document.getElementById("results").innerText = `Ping latency: ${latency} ms`;
      } catch (err) {
        document.getElementById("results").innerText = "Ping test failed: " + err;
      }
    }

    async function downloadTest() {
      const start = performance.now();
      try {
        // Use a smaller file from a reliable source
        const response = await fetch("https://speed.hetzner.de/1MB.bin");
        const blob = await response.blob();
        const end = performance.now();

        const sizeMB = blob.size / (1024*1024);
        const timeSec = (end - start) / 1000;
        const speedMbps = (sizeMB * 8) / timeSec;

        document.getElementById("results").innerText =
          `Downloaded ${sizeMB.toFixed(2)} MB in ${timeSec.toFixed(2)} seconds.\n` +
          `Approximate download speed: ${speedMbps.toFixed(2)} Mbps`;
      } catch (err) {
        document.getElementById("results").innerText = "Download test failed: " + err;
      }
    }

    async function uploadTest() {
      const start = performance.now();
      try {
        // Create a 2MB blob to upload
        const data = new Blob([new Uint8Array(2 * 1024 * 1024)], {type: "application/octet-stream"});
        await fetch("https://httpbin.org/post", {
          method: "POST",
          body: data
        });
        const end = performance.now();

        const sizeMB = data.size / (1024*1024);
        const timeSec = (end - start) / 1000;
        const speedMbps = (sizeMB * 8) / timeSec;

        document.getElementById("results").innerText =
          `Uploaded ${sizeMB.toFixed(2)} MB in ${timeSec.toFixed(2)} seconds.\n` +
          `Approximate upload speed: ${speedMbps.toFixed(2)} Mbps`;
      } catch (err) {
        document.getElementById("results").innerText = "Upload test failed: " + err;
      }
    }
  </script>
</body>
</html>
